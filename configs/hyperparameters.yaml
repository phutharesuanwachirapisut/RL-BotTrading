# ==========================================
# 🧠 PPO Agent Hyperparameters (Anti-Collapse Edition)
# ==========================================
ppo:
  # ลด Learning Rate ลงนิดหน่อย ป้องกันไม่ให้โมเดลรีบด่วนสรุปไปหา Action แย่ๆ ([-1, -1]) เร็วเกินไป
  learning_rate: 0.0001  
  
  n_steps: 4096
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  
  # 💥 เพิ่ม Entropy 5 เท่า! (สำคัญมาก) 
  # บังคับให้บอท "กล้าลองผิดลองถูก" ไม่ยอมให้กราฟ Action แบนราบเป็นเส้นตรงอีกต่อไป
  ent_coef: 0.05 

  net_arch:
    pi: [256, 256]
    vf: [256, 256]

# ==========================================
# 📈 Market Environment Configs
# ==========================================
env:
  initial_balance: 10000.0   
  # ⭐️ 1. ปรับขนาดออเดอร์ให้ผ่านเกณฑ์ขั้นต่ำ (0.001 หรือจะใช้ 0.002 ก็ได้ครับ)
  order_size: 0.002          
  
  # ⭐️ 2. ปรับเพดานถือของให้ใหญ่ตาม (ถ้าไม้ละ 0.002 เราอาจจะให้ถือได้สูงสุด 0.010 BTC)
  max_inventory: 0.010       
  
  maker_fee: -0.0005
  eta: 100.0
  min_spread: 5.0            
  max_spread: 30.0
  vol_multiplier: 10.0
  max_skew_usd: 30.0


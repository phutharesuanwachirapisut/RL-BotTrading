# ==========================================
# ⚙️ TRADING ENVIRONMENT CONFIGURATION
# ==========================================

# 1. ข้อมูลกระดานเทรด (Exchange Settings)
exchange:
  name: "binance"
  symbol: "BTC/USDT:USDT"
  market_type: "future"
  maker_fee: 0.0002        # ค่าธรรมเนียม Maker 0.02% (ใส่เป็นทศนิยม)
  taker_fee: 0.0005        # ค่าธรรมเนียม Taker 0.05%

# 2. กฎการเข้าทำกำไร (Market Making Strategy)
strategy:
  min_spread: 5.0          # ระยะห่างขั้นต่ำจากราคากลาง (USD)
  max_spread: 30.0         # ระยะห่างสูงสุดจากราคากลาง (USD)
  vol_multiplier: 10.0     # ตัวคูณขยาย Spread เวลาตลาดผันผวน
  max_skew_usd: 30.0       # ระยะเอียงราคา (Skew) สูงสุดเวลาของล้นมือ
  order_update_threshold: 2.0 # ถ้าราคาเป้าหมายขยับไม่ถึง 2 USD จะไม่แก้ตั๋ว (ประหยัด API Rate Limit)

# 3. การจัดการความเสี่ยง (Risk Management)
risk:
  order_size: 0.001        # ⭐️ ปรับจาก 0.001 เป็น 0.002 (เพื่อให้มูลค่าเกิน $100)
  max_inventory: 0.020     # ⭐️ ปรับเพดานตามไปด้วย
  circuit_breaker_usd: -50.0

# 4. การจัดการข้อมูล (Feature Engineering)
features:
  frame_stack: 5           # จำนวนวินาทีที่ส่งให้ AI ดูย้อนหลัง
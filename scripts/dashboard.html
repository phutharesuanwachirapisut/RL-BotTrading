<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HFT Quant Elite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'JetBrains+Mono', monospace;
        }

        .ob-row {
            transition: all 0.2s ease;
        }

        .ob-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-[#0b0f19] text-slate-300 p-4 h-screen overflow-hidden">

    <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
        <h1 class="text-xl font-bold text-blue-500 flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
            </span>
            HFT MARKET MAKER <span class="text-slate-500 text-xs font-normal">v3.0 LIVE</span>
        </h1>
        <div id="connection-status" class="text-xs text-green-500">System Online</div>
    </div>

    <div class="flex gap-4 h-[calc(100vh-100px)]">
        <div class="w-1/4 bg-[#151c2c] rounded-xl border border-slate-800 flex flex-col shadow-2xl overflow-hidden">
            <div
                class="p-3 bg-slate-800/30 border-b border-slate-700/50 flex justify-between text-[10px] uppercase tracking-wider font-bold">
                <span class="w-1/3">Price (USDT)</span>
                <span class="w-1/3 text-right pr-4">Size (BTC)</span>
                <span class="w-1/3 text-right">Total</span>
            </div>
            <div class="flex-1 overflow-hidden flex flex-col px-3 py-2">
                <div id="ob-asks" class="flex flex-col-reverse justify-end h-[42%] space-y-[2px]"></div>
                <div class="my-3 py-3 text-center border-y border-slate-700/50 bg-slate-900/40 rounded-lg">
                    <div id="ob-mid" class="text-2xl font-bold text-white leading-none">---</div>
                    <div class="text-[10px] text-slate-500 mt-1 uppercase">Market Mid Price</div>
                </div>
                <div id="ob-bids" class="flex flex-col h-[42%] space-y-[2px]"></div>
            </div>
        </div>

        <div class="w-3/4 flex flex-col gap-4 overflow-y-auto pr-1">
            <div class="grid grid-cols-4 gap-3">
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 shadow-sm">
                    <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Inventory</p>
                    <p class="text-2xl font-bold text-white" id="inventory">---</p>
                    <p class="text-[10px] text-slate-600 mt-1">MAX: <span id="max_inv">---</span></p>
                </div>
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 shadow-sm">
                    <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Position Cost</p>
                    <p class="text-2xl font-bold text-blue-400" id="pos_cost">---</p>
                    <p class="text-[10px] text-slate-600 mt-1">USD VALUE</p>
                </div>
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 shadow-sm">
                    <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Return (ROE)</p>
                    <p class="text-2xl font-bold" id="pnl_pct">---</p>
                    <p class="text-[10px] text-slate-600 mt-1">PERCENTAGE</p>
                </div>
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 shadow-sm relative">
                    <p class="text-slate-500 text-[10px] uppercase font-bold mb-1">Net PnL (After Fees)</p>
                    <p class="text-2xl font-bold" id="pnl">---</p>
                    <div class="flex justify-between items-center mt-2 pt-2 border-t border-slate-700/50">
                        <p class="text-[10px] text-slate-500">GROSS: <span id="gross_pnl"
                                class="text-slate-300">---</span></p>
                        <p class="text-[10px] text-red-400 font-bold">FEE: <span id="est_fees">---</span></p>
                    </div>
                </div>
            </div>

            <div
                class="bg-[#151c2c] p-5 rounded-xl border border-slate-800 shadow-inner flex justify-between items-center relative overflow-hidden">
                <div class="absolute inset-0 bg-blue-500/5 pointer-events-none"></div>
                <div class="text-center w-1/3">
                    <p class="text-slate-500 text-[10px] uppercase font-bold mb-2">My Bid (Buy)</p>
                    <p class="text-4xl font-bold text-green-500 tracking-tighter" id="bid_price">---</p>
                </div>
                <div class="text-center w-1/3 border-x border-slate-800/50 px-4">
                    <div class="flex justify-center gap-4 mb-2">
                        <div class="text-[10px] text-slate-500">SKEW: <span id="skew_val"
                                class="text-purple-400">---</span></div>
                        <div class="text-[10px] text-slate-500">VOLA: <span id="volatility"
                                class="text-yellow-500">---</span></div>
                    </div>
                    <div class="bg-slate-900/80 py-1 px-3 rounded text-xs font-bold text-slate-400" id="action">---
                    </div>
                </div>
                <div class="text-center w-1/3">
                    <p class="text-slate-500 text-[10px] uppercase font-bold mb-2">My Ask (Sell)</p>
                    <p class="text-4xl font-bold text-red-500 tracking-tighter" id="ask_price">---</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 flex-1 min-h-[450px]">
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 h-full"><canvas id="chartPnL"></canvas>
                </div>
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 h-full"><canvas id="chartTox"></canvas>
                </div>
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 h-full"><canvas
                        id="chartQuote"></canvas></div>
                <div class="bg-[#151c2c] p-4 rounded-xl border border-slate-800 h-full"><canvas id="chartInv"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const maxPoints = 60;
        const chartDefaults = {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { x: { display: false }, y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 } } } },
            plugins: { legend: { position: 'top', align: 'end', labels: { color: '#94a3b8', boxWidth: 10, font: { size: 10, weight: 'bold' } } } }
        };

        const ctxPnL = document.getElementById('chartPnL').getContext('2d');
        const chartPnL = new Chart(ctxPnL, {
            type: 'line',
            data: {
                labels: [], datasets: [
                    { label: 'NET PNL', data: [], borderColor: '#10b981', borderWidth: 2, pointRadius: 0, yAxisID: 'y' },
                    { label: 'BTC PRICE', data: [], borderColor: '#475569', borderWidth: 1, borderDash: [5, 5], pointRadius: 0, yAxisID: 'y1' }
                ]
            },
            options: { ...chartDefaults, scales: { ...chartDefaults.scales, y1: { position: 'right', grid: { drawOnChartArea: false } } } }
        });

        const chartTox = new Chart(document.getElementById('chartTox'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'TRADE IMBALANCE', data: [], borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0 }, { label: 'TOXICITY (VPIN)', data: [], borderColor: '#ef4444', borderWidth: 1, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.1)', pointRadius: 0 }] },
            options: chartDefaults
        });

        const chartQuote = new Chart(document.getElementById('chartQuote'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'SPREAD USD', data: [], borderColor: '#a855f7', borderWidth: 2, pointRadius: 0 }, { label: 'SKEW ADJ', data: [], borderColor: '#f59e0b', borderWidth: 2, pointRadius: 0 }] },
            options: chartDefaults
        });

        const chartInv = new Chart(document.getElementById('chartInv'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'NET INVENTORY', data: [], borderColor: '#3b82f6', borderWidth: 2, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)', pointRadius: 0 }] },
            options: chartDefaults
        });

        function updateChart(chart, label, values) {
            chart.data.labels.push(label);
            chart.data.datasets.forEach((ds, i) => ds.data.push(values[i]));
            if (chart.data.labels.length > maxPoints) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(ds => ds.data.shift());
            }
            chart.update();
        }

        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        let tick = 0;

        ws.onmessage = function (e) {
            const d = JSON.parse(e.data);
            tick++;

            // ⭐️ FIX: อัปเดตข้อมูล Card แค่ครั้งเดียว เพื่อป้องกัน SyntaxError
            document.getElementById("inventory").innerText = d.inventory.toFixed(4);
            if (d.max_inventory !== undefined) document.getElementById("max_inv").innerText = d.max_inventory.toFixed(4);
            document.getElementById("pos_cost").innerText = "$" + d.pos_cost.toFixed(2);
            document.getElementById("volatility").innerText = d.volatility.toFixed(5);
            document.getElementById("skew_val").innerText = d.skew.toFixed(2);
            document.getElementById("bid_price").innerText = d.bid.toFixed(2);
            document.getElementById("ask_price").innerText = d.ask.toFixed(2);
            document.getElementById("action").innerText = `STRATEGY: [SPREAD ${d.action[0].toFixed(2)}, SKEW ${d.action[1].toFixed(2)}]`;

            // PnL Formatting
            const pnlVal = d.pnl.toFixed(2);
            const pnlPct = d.pnl_pct.toFixed(2) + "%";
            document.getElementById("pnl").innerText = (d.pnl > 0 ? "+" : "") + pnlVal;
            document.getElementById("pnl_pct").innerText = (d.pnl_pct > 0 ? "+" : "") + pnlPct;
            document.getElementById("pnl").className = `text-2xl font-bold tracking-tight ${d.pnl >= 0 ? 'text-green-500' : 'text-red-500'}`;
            document.getElementById("pnl_pct").className = `text-2xl font-bold ${d.pnl_pct >= 0 ? 'text-green-500' : 'text-red-500'}`;

            if (d.gross_pnl !== undefined) {
                document.getElementById("gross_pnl").innerText = (d.gross_pnl > 0 ? "+" : "") + d.gross_pnl.toFixed(2);
                document.getElementById("est_fees").innerText = "$" + d.est_fees.toFixed(3);
            }

            // Orderbook UI (20 Levels)
            if (d.orderbook && d.orderbook.asks && d.orderbook.asks.length > 0) {
                let currentAskTotal = 0;
                const asksList = d.orderbook.asks.slice(0, 20).map(a => {
                    const price = parseFloat(a[0]);
                    const size = parseFloat(a[1]);
                    currentAskTotal += size;
                    return { price: price, size: size, total: currentAskTotal };
                });

                const askH = asksList.reverse().map(a => `
                    <div class="flex justify-between text-[13.5px] font-mono leading-none py-[2px] ob-row">
                        <span class="text-red-500 font-bold w-1/3">${a.price.toFixed(2)}</span>
                        <span class="text-slate-400 w-1/3 text-right pr-4">${a.size.toFixed(4)}</span>
                        <span class="text-slate-500 w-1/3 text-right">${a.total.toFixed(4)}</span>
                    </div>`).join('');
                document.getElementById('ob-asks').innerHTML = askH;

                let currentBidTotal = 0;
                const bidH = d.orderbook.bids.slice(0, 20).map(b => {
                    const price = parseFloat(b[0]);
                    const size = parseFloat(b[1]);
                    currentBidTotal += size;
                    return `
                    <div class="flex justify-between text-[13.5px] font-mono leading-none py-[2px] ob-row">
                        <span class="text-green-500 font-bold w-1/3">${price.toFixed(2)}</span>
                        <span class="text-slate-400 w-1/3 text-right pr-4">${size.toFixed(4)}</span>
                        <span class="text-slate-500 w-1/3 text-right">${currentBidTotal.toFixed(4)}</span>
                    </div>`;
                }).join('');
                document.getElementById('ob-bids').innerHTML = bidH;

                const midEl = document.getElementById('ob-mid');
                midEl.innerText = d.mid_price.toFixed(2);
                midEl.className = `text-2xl font-bold leading-none ${d.tfi > 0 ? 'text-green-500' : d.tfi < 0 ? 'text-red-500' : 'text-white'}`;
            }

            // Charts Update
            updateChart(chartPnL, tick, [d.pnl, d.mid_price]);
            updateChart(chartTox, tick, [d.tfi, d.vpin]);
            updateChart(chartQuote, tick, [d.spread, d.skew]);
            updateChart(chartInv, tick, [d.inventory]);
        };

        ws.onclose = () => {
            document.getElementById("connection-status").innerText = "Connection Lost";
            document.getElementById("connection-status").className = "text-xs text-red-500";
        };
    </script>
</body>

</html>
